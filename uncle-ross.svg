<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" fill="none" role="img" aria-label="Uncle Ross, the Rhodent mascot">
  <defs>
    <linearGradient id="urBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="urBelly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f0fb"/>
      <stop offset="1" stop-color="#e9dff5"/>
    </linearGradient>
    <radialGradient id="urCheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tail (wags via CSS: target .ur-tail) -->
  <path class="ur-tail" d="M62 198 C20 206 18 168 40 150 C58 136 44 120 28 126" stroke="#6D28D9" stroke-width="9" stroke-linecap="round" style="transform-origin:62px 198px"/>

  <!-- feet -->
  <ellipse cx="96" cy="238" rx="17" ry="9" fill="#5b21b6"/>
  <ellipse cx="146" cy="238" rx="17" ry="9" fill="#5b21b6"/>

  <!-- body -->
  <ellipse cx="121" cy="186" rx="58" ry="54" fill="url(#urBody)"/>
  <ellipse cx="121" cy="196" rx="34" ry="38" fill="url(#urBelly)"/>

  <!-- left arm -->
  <path d="M70 176 C50 188 46 206 56 214" stroke="#6D28D9" stroke-width="14" stroke-linecap="round"/>
  <!-- right arm: the WAVE (rotates via .ur-wave) -->
  <g class="ur-wave" style="transform-origin:172px 172px">
    <path d="M172 172 C196 162 206 138 198 120" stroke="#7c3aed" stroke-width="14" stroke-linecap="round"/>
    <circle cx="198" cy="116" r="11" fill="#A78BFA"/>
  </g>

  <!-- head -->
  <circle cx="121" cy="110" r="62" fill="url(#urBody)"/>

  <!-- ears (big round Rhodent ears) -->
  <circle cx="78" cy="58" r="26" fill="url(#urBody)"/>
  <circle cx="78" cy="58" r="13" fill="#c4a9e0"/>
  <circle cx="164" cy="58" r="26" fill="url(#urBody)"/>
  <circle cx="164" cy="58" r="13" fill="#c4a9e0"/>

  <!-- graduation cap (he's a Rhodes scholar, after all) -->
  <g>
    <path d="M121 36 L171 54 L121 72 L71 54 Z" fill="#1a1228"/>
    <path d="M150 63 v18 c0 8 -58 8 -58 0 V63" fill="#2D1269"/>
    <rect x="118" y="34" width="6" height="6" rx="1" fill="#1a1228"/>
    <line x1="121" y1="36" x2="148" y2="44" stroke="#F4C84B" stroke-width="2"/>
    <path d="M148 44 v22" stroke="#F4C84B" stroke-width="2"/>
    <circle cx="148" cy="70" r="4" fill="#F4C84B"/>
  </g>

  <!-- cheeks -->
  <circle cx="92" cy="122" r="16" fill="url(#urCheek)"/>
  <circle cx="150" cy="122" r="16" fill="url(#urCheek)"/>

  <!-- eyes (blink via .ur-eye scaleY) -->
  <g class="ur-eye" style="transform-origin:104px 104px">
    <ellipse cx="104" cy="104" rx="11" ry="13" fill="#fff"/>
    <circle cx="106" cy="106" r="6.5" fill="#1a1228"/>
    <circle cx="108.5" cy="103.5" r="2.2" fill="#fff"/>
  </g>
  <g class="ur-eye" style="transform-origin:140px 104px">
    <ellipse cx="140" cy="104" rx="11" ry="13" fill="#fff"/>
    <circle cx="138" cy="106" r="6.5" fill="#1a1228"/>
    <circle cx="140.5" cy="103.5" r="2.2" fill="#fff"/>
  </g>

  <!-- nose + snout -->
  <ellipse cx="122" cy="128" rx="8" ry="6" fill="#ec4899"/>
  <path d="M122 134 v8" stroke="#3a1f5c" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M122 142 q-9 7 -18 3" stroke="#3a1f5c" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M122 142 q9 7 18 3" stroke="#3a1f5c" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- whiskers -->
  <g stroke="#c4a9e0" stroke-width="2" stroke-linecap="round">
    <path d="M104 130 q-26 -2 -42 4"/>
    <path d="M104 136 q-26 4 -40 12"/>
    <path d="M140 130 q26 -2 42 4"/>
    <path d="M140 136 q26 4 40 12"/>
  </g>
</svg>
