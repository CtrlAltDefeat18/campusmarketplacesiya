<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Profile · Campus Marketplace</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/tailwind.css"/>
</head>
<body class="pt-14">

<!-- NAV -->
<nav class="nav-shell">
  <div class="container-cm flex items-center gap-3 h-14">
    <a href="/" class="flex items-center gap-2 shrink-0">
      <img src="/favicon.svg" class="h-8 w-8" alt=""/>
      <span class="font-syne font-extrabold text-white text-sm tracking-tight">Campus<span class="text-violet-300">Marketplace</span></span>
    </a>
    <div class="ml-auto hidden md:flex items-center gap-1">
      <a href="/" data-navlink class="nav-link">Home</a>
      <a href="/marketplace" data-navlink class="nav-link">Marketplace</a>
      <a href="/sell" data-navlink class="nav-link">Sell</a>
      <a href="/news" data-navlink class="nav-link">News</a>
      <a href="/profile" data-navlink class="nav-link">Profile</a>
      <a href="/admin" class="nav-link ml-1 bg-violet-600 text-white hover:bg-violet-700 hover:text-white">Admin</a>
    </div>
    <button data-burger class="md:hidden ml-auto p-2 text-white/90" aria-label="Menu">
      <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div data-mobilemenu class="hidden md:hidden border-t border-white/10 bg-plum-deep/95">
    <div class="container-cm py-2 flex flex-col">
      <a href="/" class="nav-link py-3">🏠 Home</a>
      <a href="/marketplace" class="nav-link py-3">🛒 Marketplace</a>
      <a href="/sell" class="nav-link py-3">🏷️ Sell an Item</a>
      <a href="/news" class="nav-link py-3">📰 News</a>
      <a href="/profile" class="nav-link py-3">👤 Profile</a>
      <a href="/admin" class="nav-link py-3">⚙️ Admin</a>
    </div>
  </div>
</nav>

<!-- GUEST GATE -->
<section id="gate" class="hidden min-h-[80vh] grid place-items-center px-5">
  <div class="card max-w-md w-full p-8 text-center">
    <div class="text-5xl mb-3">🔐</div>
    <h1 class="font-syne text-2xl font-extrabold">Sign in to view your profile</h1>
    <p class="text-muted text-sm mt-2 mb-6">Track your listings, manage your details, and sell faster.</p>
    <a href="/login?next=/profile" class="btn-primary w-full">Sign In</a>
    <a href="/marketplace" class="btn-ghost w-full mt-3">Browse as guest</a>
  </div>
</section>

<!-- PROFILE -->
<section id="profileView" class="hidden">
  <!-- banner -->
  <div class="bg-hero-plum text-white">
    <div class="container-cm py-10 flex items-center gap-4">
      <div id="avatar" class="w-16 h-16 rounded-2xl bg-white/15 backdrop-blur grid place-items-center font-syne text-2xl font-extrabold"></div>
      <div class="min-w-0">
        <h1 id="hName" class="font-syne text-2xl font-extrabold truncate"></h1>
        <p id="hMeta" class="text-white/60 text-sm truncate"></p>
      </div>
      <button id="logout" class="ml-auto btn-ghost !border-white/30 !text-white hover:!bg-white/10 px-4 py-2 text-xs">Log out</button>
    </div>
  </div>

  <div class="container-cm py-8 grid lg:grid-cols-3 gap-6">
    <!-- details -->
    <div class="lg:col-span-1">
      <div class="card p-5">
        <h2 class="font-syne font-bold text-lg mb-4">Your Details</h2>
        <form id="detailsForm" class="space-y-3">
          <div><label class="label">Full Name</label><input id="d-name" class="input"/></div>
          <div><label class="label">Email</label><input id="d-email" type="email" class="input"/></div>
          <div><label class="label">WhatsApp</label><input id="d-whatsapp" class="input" placeholder="27821234567"/></div>
          <div><label class="label">Faculty / Year</label><input id="d-faculty" class="input"/></div>
          <button class="btn-primary w-full">Save Changes</button>
        </form>
      </div>
    </div>

    <!-- my listings -->
    <div class="lg:col-span-2">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-syne font-bold text-lg">My Listings</h2>
        <a href="/sell" class="btn-violet px-4 py-2 text-xs">+ List an Item</a>
      </div>
      <div id="myListings" class="grid sm:grid-cols-2 gap-4"></div>
    </div>
  </div>
</section>

<script src="/static/app.js"></script>
<script>
const { qs, esc, money, getUser, setUser, logout, toast } = window.CM;

function statusBadge(s) {
  const map = { approved: "badge-green", pending: "badge-amber", rejected: "badge-red", sold: "" };
  return `<span class="badge ${map[s]||''}">${esc(s||'pending')}</span>`;
}

function myListings() {
  try { return JSON.parse(localStorage.getItem("cm_my_listings") || "[]"); } catch (_) { return []; }
}

function renderListings() {
  const list = myListings();
  qs("#myListings").innerHTML = list.length ? list.map(p => `
    <div class="card p-4">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-semibold">${esc(p.title)}</span>${statusBadge(p.status)}
      </div>
      <div class="text-plum font-syne font-bold mt-0.5">${money(p.price)}</div>
      <div class="text-xs text-muted mt-1">${esc(p.category||'')} · submitted ${esc((p.submittedAt||'').slice(0,10))}</div>
      ${p.status === 'pending' ? `<p class="text-xs text-amber-700 mt-2">⏳ Awaiting admin approval (usually within 24h).</p>` : ``}
      ${p.status === 'approved' ? `<a href="/marketplace" class="text-xs text-plum font-semibold hover:underline mt-2 inline-block">View on marketplace →</a>` : ``}
    </div>`).join("")
    : `<div class="card p-10 text-center text-muted sm:col-span-2">
        <div class="text-4xl mb-2">📦</div>
        <p>No listings yet.</p>
        <a href="/sell" class="btn-primary mt-4 inline-flex">List your first item</a>
      </div>`;
}

function boot() {
  const u = getUser();
  if (!u) { qs("#gate").classList.remove("hidden"); return; }
  qs("#profileView").classList.remove("hidden");
  qs("#avatar").textContent = (u.name || "?")[0].toUpperCase();
  qs("#hName").textContent = u.name || "Student";
  qs("#hMeta").textContent = [u.email, u.faculty].filter(Boolean).join(" · ") || "Campus member";
  qs("#d-name").value = u.name || "";
  qs("#d-email").value = u.email || "";
  qs("#d-whatsapp").value = u.whatsapp || "";
  qs("#d-faculty").value = u.faculty || "";
  renderListings();
}

qs("#detailsForm").addEventListener("submit", (e) => {
  e.preventDefault();
  setUser({
    name: qs("#d-name").value.trim(),
    email: qs("#d-email").value.trim(),
    whatsapp: qs("#d-whatsapp").value.trim(),
    faculty: qs("#d-faculty").value.trim(),
  });
  toast("Profile saved ✓");
  boot();
});
qs("#logout").addEventListener("click", () => { logout(); location.href = "/"; });

boot();
</script>
</body>
</html>
